graph:
  # The curated simulation baseline (build_simulation_baseline.py): endogenous
  # entities only, STRING PPIs integrated, reactions folded into produces/
  # consumes edges. ~4.6 edges/entity vs ~1.9 for the full graph, and 2% vs 20%
  # isolated nodes. To run on the full audited graph instead, point these at
  # data/normalized and data/registry.
  normalized_dir: data/normalized/simulation
  registry_dir: data/registry/simulation
  edge_weights: configs/edge_weights.yaml

simulation:
  max_rounds: 5
  initial_profile: data/initial_conditions/glucose_log_phase.yaml
  # Steady-state detection is report metadata only. It must not stop a run.
  steady_state_patience: 2
  retrieval_radius: 2
  min_retrieval_score: 0.20
  store_root: runs

resources:
  default_gpus: 2
  agents_per_gpu: 50

llm:
  enabled: false
  max_concurrency_per_gpu: 50
  timeout_seconds: 120
  max_retries: 2

fallback:
  policy: configs/fallback_rules.yaml

report:
  phenotype_db: data/phenotypes/phenotype_db.yaml

perturbation:
  knowledge_base: data/perturbations/perturbation_knowledge.yaml
