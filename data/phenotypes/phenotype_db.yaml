# ⚠️ DEV-ONLY / NOT A VALIDATION BENCHMARK.
# These patterns are SELF-AUTHORED (we wrote both the scenario and the expected
# answer), so scores on them are circular and must NOT be reported as evidence of
# model quality. They are kept only as fast deterministic smoke-tests during
# development. The real, externally-grounded battery is being built from
# literature (docs/LITERATURE_EVIDENCE_2023_2026.md -> data/literature/) and from
# RegulonDB (scripts/benchmark_perturbation.py) / co-expression
# (scripts/validate_coexpression.py). See docs/REMOTE_WORK_PLAN.md.
#
# Optional response-pattern database used by ReportAgent and the offline
# evaluation baseline.
#
# "Phenotype" here does not mean the simulator must force a biological label.
# It is only a curated comparison rubric: after a run, the reporter and the
# eval script can ask whether the final changed-state pattern resembles a
# known response.
#
# Patterns are tagged with a ``signal_level`` so the evaluator can bucket
# them by signal complexity:
#
#   L0  no signal            (baseline, no expected change)
#   L1  single signal        (mock and LLM should both get it right)
#   L2  two signals,         (LLM is the only path that can resolve)
#       direction conflict
#   L3  three+ signals,      (only LLM with annotation can reason)
#       complex conflict
#   L4  graph-external       (LLM must reason from annotation alone)
#       inference
#
# L2+ patterns are the ones that prove the LLM is adding real value over
# the deterministic mock. If mock and LLM tie on L2, the LLM is not paying
# for itself.
#
# Curated against ``data/normalized/simulation`` (10.7k entities, ~49k edges).
#   * Protein ids are UniProt accession with the ``protein.`` prefix.
#   * Gene ids are EcoCyc b-numbers with the ``gene.`` prefix.
#   * AraC protein is ``protein.P0A9E0`` (NOT ``P0ACT01``).
#   * Every ``from`` listed in a ``signals`` block must have at least one
#     ``activates`` / ``represses`` / ``encodes`` edge into the target.
#     Self-perturbations (``self_inhibits``) set the entity's state
#     directly via the rule engine, no edge required.

# ===========================================================================
# L0 — baseline / no signal
# ===========================================================================

no_signal_baseline:
  description: |
    No perturbation applied; agents should remain at their initial profile
    values. This is the negative control that proves the simulator does not
    produce spurious changes on its own.
  signal_level: L0
  expected_states: {}
  expected_abundance: {}

# ===========================================================================
# L1 — single signal, no conflict
# ===========================================================================

lac_operon_derepression_like:
  description: |
    L1 single-signal pattern: LacI is inhibited alone, so lacZYA genes
    should become expressed.
  signal_level: L1
  signals:
    gene.b0344:
      - {from: protein.P03023, edge: represses, state: inhibited}
    gene.b0343:
      - {from: protein.P03023, edge: represses, state: inhibited}
    gene.b0342:
      - {from: protein.P03023, edge: represses, state: inhibited}
  expected_states:
    gene.b0344: expressed
    gene.b0343: expressed
    gene.b0342: expressed

lacI_active_repression_like:
  description: |
    L1 single-signal pattern: LacI is set to active; lacZYA genes should
    be repressed.
  signal_level: L1
  signals:
    gene.b0344:
      - {from: protein.P03023, edge: represses, state: active}
    gene.b0343:
      - {from: protein.P03023, edge: represses, state: active}
    gene.b0342:
      - {from: protein.P03023, edge: represses, state: active}
  expected_states:
    gene.b0344: repressed
    gene.b0343: repressed
    gene.b0342: repressed

lactose_induction_like:
  description: |
    L1 single-signal pattern: lactose induction. LacI is inhibited (what
    allolactose binding does in vivo), so LacZYA become expressed and the
    LacZ/Y/A proteins accumulate.
  signal_level: L1
  signals:
    gene.b0344:
      - {from: protein.P03023, edge: represses, state: inhibited}
    gene.b0343:
      - {from: protein.P03023, edge: represses, state: inhibited}
    gene.b0342:
      - {from: protein.P03023, edge: represses, state: inhibited}
  expected_states:
    gene.b0344: expressed
    gene.b0343: expressed
    gene.b0342: expressed
  expected_abundance:
    protein.P00722: high
    protein.P02920: high
    protein.P07464: high

beta_lactam_cell_wall_response:
  description: |
    Beta-lactam-like response pattern; penicillin-binding proteins involved
    in peptidoglycan cross-linking are inhibited. Driven by directly
    perturbing each PBP to the inhibited state (self-perturbation).
  signal_level: L1
  signals:
    protein.P02918:
      - {from: protein.P02918, edge: self_inhibits, state: inhibited}
    protein.P02919:
      - {from: protein.P02919, edge: self_inhibits, state: inhibited}
    protein.P0AD68:
      - {from: protein.P0AD68, edge: self_inhibits, state: inhibited}
  expected_states:
    protein.P02918: inhibited
    protein.P02919: inhibited
    protein.P0AD68: inhibited

aminoglycoside_translation_response:
  description: |
    Aminoglycoside-like response pattern; 30S ribosomal proteins linked
    to streptomycin response / translational accuracy are inhibited.
  signal_level: L1
  signals:
    protein.P0A7S3:
      - {from: protein.P0A7S3, edge: self_inhibits, state: inhibited}
    protein.P0A7V8:
      - {from: protein.P0A7V8, edge: self_inhibits, state: inhibited}
  expected_states:
    protein.P0A7S3: inhibited
    protein.P0A7V8: inhibited

oxidative_stress_response_like:
  description: |
    Oxidative-stress-like response pattern. OxyR (active) and SoxR
    (active) drive the peroxide / superoxide regulons.
    Verified against the simulation graph:
      OxyR (P0ACQ4)  -> activates katG (b3942), represses oxyR (b3961)
      SoxR (P0ACS2)  -> activates b4060/b4062/etc., represses soxR (b4063)
    Therefore expected states mirror the actual auto-regulation:
    katG is overexpressed (target of activator) while oxyR / soxR are
    themselves auto-repressed.
  signal_level: L1
  signals:
    gene.b3942:
      - {from: protein.P0ACQ4, edge: activates, state: active}
    gene.b3961:
      - {from: protein.P0ACQ4, edge: represses, state: active}
    gene.b4063:
      - {from: protein.P0ACS2, edge: represses, state: active}
  expected_states:
    gene.b3942: overexpressed   # katG — driven up by OxyR activator
    gene.b3961: repressed       # oxyR — auto-repressed by OxyR
    gene.b4063: repressed       # soxR — auto-repressed by SoxR

cell_division_inhibition_like:
  description: |
    Cell-division inhibition-like pattern centered on FtsZ ring assembly
    impairment. Driven by directly perturbing FtsZ to the inhibited state.
  signal_level: L1
  signals:
    protein.P0A9A6:
      - {from: protein.P0A9A6, edge: self_inhibits, state: inhibited}
  expected_states:
    protein.P0A9A6: inhibited

# ===========================================================================
# L2 — two signals, direction conflict
# These are the patterns that prove the LLM earns its keep.
# ===========================================================================

lac_dual_signal_glucose_present:
  description: |
    L2 conflict pattern: lactose is added AND glucose is present.
    Signal 1: allolactose binds LacI -> repression released (pushes UP)
    Signal 2: CRP-cAMP is low because glucose is high (pushes DOWN)
    Net effect: lacZYA are only weakly expressed; abundance stays low
    because CRP-cAMP (the transcriptional activator) is the bottleneck.
  signal_level: L2
  signals:
    gene.b0344:
      - {from: protein.P03023, edge: represses, state: inhibited}
      - {from: protein.P0ACJ8, edge: activates, state: low}
    gene.b0343:
      - {from: protein.P03023, edge: represses, state: inhibited}
      - {from: protein.P0ACJ8, edge: activates, state: low}
    gene.b0342:
      - {from: protein.P03023, edge: represses, state: inhibited}
      - {from: protein.P0ACJ8, edge: activates, state: low}
  expected_states:
    gene.b0344: expressed
    gene.b0343: expressed
    gene.b0342: expressed
  expected_abundance:
    # Promoter is unblocked (LacI gone) but the activator CRP-cAMP is
    # at "low" -> the LLM emits change_abundance strength=0, which
    # keeps the existing (default-medium) abundance. The mock has no
    # concept of efficiency, so it leaves abundance at the initial
    # blank/medium state too. Both end up at "medium" — the test
    # therefore does not distinguish mock vs LLM on this axis today.
    protein.P00722: medium
    protein.P02920: medium
    protein.P07464: medium
  notes: |
    The mock picks the first matching edge in iteration order (usually
    the represses edge from LacI) and emits "expressed" for the gene
    state but does not propagate to the encoded protein at all. The LLM
    should reason "promoter unblocked but transcriptional activator
    missing" and emit change_abundance with strength=0 (no change).
    On the gene-state axis both modes get full credit; on the
    abundance axis the rubric currently accepts "medium" as the
    LLM-correct answer (modest production).

ara_dual_signal_arabinose_absent:
  description: |
    L2 conflict pattern: arabinose absent; AraC is in its default
    repressor conformation. araBAD genes should remain repressed even
    though CRP-cAMP is available.
    Biological note: ara operon in this graph is b0061=araD, b0062=araA,
    b0063=araB (verified against EcoCyc).
  signal_level: L2
  signals:
    gene.b0061:
      - {from: protein.P0A9E0, edge: represses, state: active}
      - {from: protein.P0ACJ8, edge: activates, state: medium}
    gene.b0062:
      - {from: protein.P0A9E0, edge: represses, state: active}
      - {from: protein.P0ACJ8, edge: activates, state: medium}
    gene.b0063:
      - {from: protein.P0A9E0, edge: represses, state: active}
      - {from: protein.P0ACJ8, edge: activates, state: medium}
  expected_states:
    gene.b0061: repressed
    gene.b0062: repressed
    gene.b0063: repressed

glucose_to_lactose_shift:
  description: |
    L2 conflict pattern: glucose is removed AND lactose is added.
    Both signals push UP (catabolite repression released + LacI
    de-repressed). Tests strength aggregation across same-direction
    dual signals. With two co-aligned inputs the model must escalate
    strength to 2 so the gene reaches ``overexpressed``.
  signal_level: L2
  signals:
    gene.b0344:
      - {from: protein.P03023, edge: represses, state: inhibited}
      - {from: protein.P0ACJ8, edge: activates, state: high}
    gene.b0343:
      - {from: protein.P03023, edge: represses, state: inhibited}
      - {from: protein.P0ACJ8, edge: activates, state: high}
  expected_states:
    gene.b0344: overexpressed
    gene.b0343: overexpressed
  expected_abundance:
    protein.P00722: high
    protein.P02920: high

# Added 2026-06-13 per REMOTE_WORK_PLAN.md Phase 1: expand L2 battery.

ara_induction_full:
  description: |
    L2 same-direction pattern: arabinose present AND glucose absent
    (CRP-cAMP high). AraC switches to inducer conformation; CRP-cAMP
    is high. Both signals push UP -> strong araBAD induction. Tests
    strength escalation on a different operon than glucose_to_lactose_shift.
  signal_level: L2
  signals:
    gene.b0061:
      - {from: protein.P0A9E0, edge: represses, state: inhibited}
      - {from: protein.P0ACJ8, edge: activates, state: high}
    gene.b0062:
      - {from: protein.P0A9E0, edge: represses, state: inhibited}
      - {from: protein.P0ACJ8, edge: activates, state: high}
    gene.b0063:
      - {from: protein.P0A9E0, edge: represses, state: inhibited}
      - {from: protein.P0ACJ8, edge: activates, state: high}
  expected_states:
    gene.b0061: overexpressed
    gene.b0062: overexpressed
    gene.b0063: overexpressed

# ===========================================================================
# L3 — three or more signals, complex conflict
# ===========================================================================

sos_response_like:
  description: |
    SOS-response-like pattern. LexA (P0A7C2) auto-represses itself
    (b4043) and many SOS genes including b2699 (recA), b0060, b0779, etc.
    The simulation graph carries NO ``activates`` edge from RecA
    (P0A7G6) into any gene, so the only signal pathway available is
    ``LexA inhibited -> SOS genes derepressed``. We drive that here.
    Expected: lexA (b4043) becomes expressed (auto-repressor removed),
    and other LexA targets (e.g. recA b2699) become expressed as well.
  signal_level: L3
  signals:
    gene.b4043:
      - {from: protein.P0A7C2, edge: represses, state: inhibited}
    gene.b2699:
      - {from: protein.P0A7C2, edge: represses, state: inhibited}
  expected_states:
    gene.b4043: expressed      # lexA derepressed
    gene.b2699: expressed      # recA derepressed
