profile_id: glucose_log_phase
description: >
  Baseline profile for E. coli MG1655 growing logarithmically with glucose
  as the primary carbon source under aerobic conditions. This profile
  seeds both the small-molecule environment and the central carbon
  metabolism / cAMP-CRP regulatory system so the simulator can resolve
  realistic catabolite-repression and inducer-shift behavior.
source: database
confidence: medium
notes: >
  Conservative seed profile. It only sets a small number of environment-defining
  molecules and lac/cAMP-related regulators; broad proteome/transcriptome
  condition annotation can be generated later by batch LLM and reviewed into
  this file.

# ---------------------------------------------------------------------------
# Section 1: Carbon sources and primary fermentative outputs
# ---------------------------------------------------------------------------
overrides:

  # ----- Bulk carbon and energy cofactors (aerobic log phase) -----
  molecule.C00031:
    state: high
    abundance_label: high
    confidence: high
    reason: Glucose is the primary supplied carbon source in this initial condition.
  molecule.C00007:
    state: high
    abundance_label: high
    confidence: medium
    reason: Aerobic rich oxygen availability is the default in glucose log phase.
  molecule.C00002:
    state: high
    abundance_label: high
    confidence: medium
    reason: Log-phase growth is energy-replete relative to starvation profiles.
  molecule.C00008:
    state: medium
    abundance_label: medium
    confidence: medium
    reason: ADP remains present during active growth.
  molecule.C00020:
    state: medium
    abundance_label: medium
    confidence: medium
    reason: AMP is a small but measurable pool during exponential growth.
  molecule.C00003:
    state: medium
    abundance_label: medium
    confidence: medium
    reason: NAD+ is held high during oxidative phosphorylation.
  molecule.C00004:
    state: medium
    abundance_label: medium
    confidence: medium
    reason: NADH is sustained by glycolysis and the TCA cycle.
  molecule.C00005:
    state: medium
    abundance_label: medium
    confidence: medium
    reason: NADPH is fed by zwf/gnd of the oxidative pentose phosphate pathway.
  molecule.C00006:
    state: medium
    abundance_label: medium
    confidence: medium
    reason: NADP+ accompanies the NADPH pool.
  molecule.C00010:
    state: medium
    abundance_label: medium
    confidence: medium
    reason: CoA is needed for acetyl-CoA formation and TCA flux.
  molecule.C00009:
    state: high
    abundance_label: high
    confidence: medium
    reason: Orthophosphate is abundant in standard M9/glucose medium.
  molecule.C00011:
    state: medium
    abundance_label: medium
    confidence: medium
    reason: CO2 is produced by decarboxylation steps in the TCA cycle.
  molecule.C00014:
    state: medium
    abundance_label: medium
    confidence: medium
    reason: Ammonia source is permissive in glucose log phase.
  molecule.C00064:
    state: medium
    abundance_label: medium
    confidence: low
    reason: Glutamine is consumed as a nitrogen donor during active growth.
  molecule.C00025:
    state: medium
    abundance_label: medium
    confidence: low
    reason: Glutamate pool is roughly stable in glucose log phase.
  molecule.C00026:
    state: medium
    abundance_label: medium
    confidence: low
    reason: 2-Oxoglutarate links carbon and nitrogen metabolism.

  # ----- Substrates absent in baseline glucose log phase -----
  molecule.C00243:
    state: absent
    abundance_label: absent
    confidence: high
    reason: Lactose is absent unless explicitly added as a perturbation.
  molecule.C05396:
    state: absent
    abundance_label: absent
    confidence: medium
