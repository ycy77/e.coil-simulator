  # ----- Catabolite repression signature -----
  molecule.C00575:
    state: low
    abundance_label: low
    confidence: medium
    reason: Glucose-rich conditions are treated as low-cAMP (catabolite repression).

  # ----- Glycolytic intermediates (typical log-phase values) -----
  molecule.C00092:
